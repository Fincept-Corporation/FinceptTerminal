## Cirrus CI — macOS Apple Silicon build
## Complements GitHub Actions (Linux + Windows).
## Free for public repos: ~3,300 macOS CPU-minutes/month.
## Runs on: push to main/develop, pull_request, tags (v*)

build_task:
  name: macOS arm64 (Apple Silicon)
  timeout_in: 90m

  only_if: $CIRRUS_BRANCH == 'main' || $CIRRUS_BRANCH == 'develop' || $CIRRUS_TAG != '' || $CIRRUS_PR != ''

  macos_instance:
    # Sequoia — matches GitHub Actions macos-15 runners
    image: ghcr.io/cirruslabs/macos-runner:sequoia

  env:
    HOMEBREW_NO_AUTO_UPDATE: "1"
    HOMEBREW_NO_INSTALL_CLEANUP: "1"
    HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK: "1"
    BUILD_TYPE: Release
    QT_VERSION: "6.8.3"
    QT_MODULES: "qtcharts qtwebsockets qtmultimedia"
    QT_INSTALL_DIR: "$HOME/Qt"
    APP_NAME: FinceptTerminal

  # ── Homebrew tools cache (no Qt here — Qt installed via aqtinstall) ────────
  brew_cache:
    folder: "$HOME/Library/Caches/Homebrew"
    fingerprint_script: echo "brew-tools-ccache-ninja-cmake-py312-$(date +%Y-%m)"
    populate_script:
      - brew install ccache ninja cmake python@3.12

  # ── Qt cache — keyed to exact version + modules ───────────────────────────
  qt_cache:
    folder: "$HOME/Qt"
    fingerprint_script: echo "qt-${QT_VERSION}-macos-clang_64-${QT_MODULES}-v2"
    populate_script:
      # aqtinstall installs the official Qt release including private headers.
      # This is the same tool jurplel/install-qt-action uses on GitHub Actions.
      # Syntax: aqt install-qt --outputdir <dir> <host> <target> <version> [arch] -m <modules...>
      # arch=clang_64 is the correct Qt 6 macOS identifier (universal binary, arm64+x86_64)
      # Install path will be: $HOME/Qt/6.8.3/macos/
      - pip3 install --break-system-packages aqtinstall
      - aqt install-qt --outputdir "$HOME/Qt" mac desktop ${QT_VERSION} clang_64 -m ${QT_MODULES}

  # ── ccache build artifact cache ───────────────────────────────────────────
  ccache_cache:
    folder: "$HOME/.ccache"
    fingerprint_script: echo "${QT_VERSION}-$(git log --oneline -10 | shasum | cut -c1-16)"

  # ── Checkout with submodules ───────────────────────────────────────────────
  clone_script: |
    if [ -z "$CIRRUS_PR" ]; then
      git clone --recursive --depth=10 \
        "https://x-access-token:${CIRRUS_REPO_CLONE_TOKEN}@github.com/${CIRRUS_REPO_FULL_NAME}.git" \
        "$CIRRUS_WORKING_DIR"
      git checkout "$CIRRUS_CHANGE_IN_REPO"
    else
      git clone --recursive --depth=10 \
        "https://x-access-token:${CIRRUS_REPO_CLONE_TOKEN}@github.com/${CIRRUS_REPO_FULL_NAME}.git" \
        "$CIRRUS_WORKING_DIR"
      git fetch origin "pull/$CIRRUS_PR/head:pr"
      git checkout pr
    fi

  # ── Resolve paths and export to env ───────────────────────────────────────
  setup_script: |
    set -euo pipefail
    # aqtinstall with clang_64 installs into: $HOME/Qt/6.8.3/macos/
    QT_ROOT="${QT_INSTALL_DIR}/${QT_VERSION}/macos"
    CCACHE_BIN="$(brew --prefix ccache)/bin"
    echo "QT_ROOT=${QT_ROOT}" >> $CIRRUS_ENV
    echo "PATH=${QT_ROOT}/bin:${CCACHE_BIN}:$PATH" >> $CIRRUS_ENV
    echo "Qt root: ${QT_ROOT}"
    "${QT_ROOT}/bin/qmake" --version

  # ── Configure CMake ───────────────────────────────────────────────────────
  configure_script: |
    set -euo pipefail
    cmake -B fincept-qt/build \
      -S fincept-qt \
      -G Ninja \
      -DCMAKE_BUILD_TYPE=${BUILD_TYPE} \
      -DCMAKE_PREFIX_PATH="${QT_ROOT}" \
      -DCMAKE_OSX_ARCHITECTURES=arm64 \
      -DCMAKE_C_COMPILER_LAUNCHER=ccache \
      -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
      -DFINCEPT_BUILD_INSTALLER=OFF \
      -DDEPLOY_QT=OFF

  # ── Build ─────────────────────────────────────────────────────────────────
  build_script: |
    set -euo pipefail
    cmake --build fincept-qt/build \
      --config ${BUILD_TYPE} \
      --parallel $(sysctl -n hw.logicalcpu)

  # ── Package ───────────────────────────────────────────────────────────────
  package_script: |
    set -euo pipefail
    MACDEPLOYQT="${QT_ROOT}/bin/macdeployqt"
    BUILD_DIR="fincept-qt/build"
    DIST_DIR="fincept-qt/dist"
    mkdir -p "${DIST_DIR}"

    # ── Locate or create .app bundle ─────────────────────────────────────────
    if [ -d "${BUILD_DIR}/${APP_NAME}.app" ]; then
      APP_BUNDLE="${BUILD_DIR}/${APP_NAME}.app"
    else
      APP_BUNDLE="${BUILD_DIR}/${APP_NAME}.app"
      mkdir -p "${APP_BUNDLE}/Contents/MacOS"
      cp "${BUILD_DIR}/${APP_NAME}" "${APP_BUNDLE}/Contents/MacOS/${APP_NAME}"
      chmod +x "${APP_BUNDLE}/Contents/MacOS/${APP_NAME}"
      cat > "${APP_BUNDLE}/Contents/Info.plist" <<'PLIST'
    <?xml version="1.0" encoding="UTF-8"?>
    <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
    <plist version="1.0"><dict>
      <key>CFBundleExecutable</key><string>FinceptTerminal</string>
      <key>CFBundleIdentifier</key><string>in.fincept.terminal</string>
      <key>CFBundleName</key><string>FinceptTerminal</string>
      <key>CFBundlePackageType</key><string>APPL</string>
      <key>CFBundleShortVersionString</key><string>4.0.0</string>
      <key>NSHighResolutionCapable</key><true/>
    </dict></plist>
    PLIST
    fi

    # ── macdeployqt — bundles all Qt frameworks + plugins + fixes rpaths ─────
    echo "Running macdeployqt..."
    "${MACDEPLOYQT}" "${APP_BUNDLE}" -always-overwrite 2>&1 || true

    # ── Embed Python 3.12 framework ───────────────────────────────────────────
    PY_PREFIX="$(brew --prefix python@3.12)"
    PY_FRAMEWORK="${PY_PREFIX}/Frameworks/Python.framework"
    BUNDLE_FRAMEWORKS="${APP_BUNDLE}/Contents/Frameworks"
    mkdir -p "${BUNDLE_FRAMEWORKS}"

    if [ -d "${PY_FRAMEWORK}" ]; then
      echo "Embedding Python.framework..."
      cp -R "${PY_FRAMEWORK}" "${BUNDLE_FRAMEWORKS}/"
      ln -sf "../Frameworks/Python.framework/Versions/3.12/bin/python3.12" \
             "${APP_BUNDLE}/Contents/MacOS/python3" 2>/dev/null || true
      echo "Python.framework embedded"
    else
      echo "WARNING: Python.framework not found — copying binary only"
      PY_BIN="${PY_PREFIX}/bin/python3.12"
      if [ -f "${PY_BIN}" ]; then
        cp "${PY_BIN}" "${APP_BUNDLE}/Contents/MacOS/python3"
        chmod +x "${APP_BUNDLE}/Contents/MacOS/python3"
      fi
    fi

    # ── Copy resources and Python analytics scripts ───────────────────────────
    cp -r fincept-qt/resources "${APP_BUNDLE}/Contents/Resources/" 2>/dev/null || true
    cp -r fincept-qt/scripts   "${APP_BUNDLE}/Contents/Resources/scripts" 2>/dev/null || true

    # ── Move finished bundle into dist/ ──────────────────────────────────────
    cp -r "${APP_BUNDLE}" "${DIST_DIR}/"

    # ── Diagnostics ──────────────────────────────────────────────────────────
    BINARY="${DIST_DIR}/${APP_NAME}.app/Contents/MacOS/${APP_NAME}"
    echo "=== Binary info ===" && file "${BINARY}" && lipo -info "${BINARY}"
    echo "=== Bundle size ===" && du -sh "${DIST_DIR}/${APP_NAME}.app"
    echo "=== Qt frameworks ===" && ls "${DIST_DIR}/${APP_NAME}.app/Contents/Frameworks/" | grep -i qt || true
    echo "=== Plugins ===" && find "${DIST_DIR}/${APP_NAME}.app/Contents/PlugIns" -name "*.dylib" 2>/dev/null | sort || true

    # ── Tar to preserve execute permissions ──────────────────────────────────
    tar -czf fincept-qt/dist.tar.gz -C "${DIST_DIR}" .
    echo "Archive: fincept-qt/dist.tar.gz ($(du -sh fincept-qt/dist.tar.gz | cut -f1))"

  # ── Upload artifact ───────────────────────────────────────────────────────
  dist_artifacts:
    path: "fincept-qt/dist.tar.gz"
