name: Build Linux Installer (QtIFW)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  BUILD_TYPE: Release
  QT_VERSION: "6.8.3"
  QT_MODULES: "qtcharts qtwebsockets qtmultimedia"
  QT_IFW_VERSION: "4.7"
  QT_IFW_TOOL: "tools_ifw"
  APP_NAME: FinceptTerminal
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Linux x64 Installer
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-tags: true

      # ── ccache ────────────────────────────────────────────────────────────
      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: linux-x64-installer-${{ env.QT_VERSION }}
          max-size: 500M
          update-package-index: true

      # ── System dependencies ───────────────────────────────────────────────
      - name: Install system dependencies
        run: |
          sudo add-apt-repository universe -y
          sudo apt-get update -qq
          sudo apt-get install -y \
            cmake ninja-build g++ \
            libssl-dev \
            qt6-base-dev qt6-base-private-dev \
            qt6-tools-dev qt6-tools-dev-tools \
            libqt6charts6-dev libqt6websockets6-dev \
            qt6-multimedia-dev libqt6multimediawidgets6 \
            libqt6svg6-dev libqt6concurrent6 \
            libgl1-mesa-dev libglu1-mesa-dev \
            libxkbcommon-dev libxkbcommon-x11-0 \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-xinerama0 libxcb-xkb1 \
            python3 python3-pip \
            pkg-config zip

      # ── Install Qt Installer Framework ────────────────────────────────────
      - name: Install Qt Installer Framework
        run: |
          pip3 install aqtinstall
          aqt install-tool linux desktop ${{ env.QT_IFW_TOOL }} \
            --outputdir "${{ runner.temp }}/qtifw"
          IFW_DIR="${{ runner.temp }}/qtifw/Tools/QtInstallerFramework/${{ env.QT_IFW_VERSION }}"
          echo "QT_IFW_DIR=${IFW_DIR}" >> "$GITHUB_ENV"
          echo "PATH=${IFW_DIR}/bin:${PATH}" >> "$GITHUB_ENV"
          echo "QtIFW installed:"
          ls "${IFW_DIR}/bin/" || true

      # ── Configure CMake ───────────────────────────────────────────────────
      - name: Configure CMake
        working-directory: fincept-qt
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DDEPLOY_QT=ON \
            -DFINCEPT_BUILD_INSTALLER=ON

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build
        working-directory: fincept-qt
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel $(nproc)

      # ── Verify binary ─────────────────────────────────────────────────────
      - name: Verify binary
        working-directory: fincept-qt
        run: |
          BINARY="build/${{ env.APP_NAME }}"
          if [ ! -f "$BINARY" ]; then
            echo "::error::Binary not found at $BINARY"
            find build -maxdepth 3 -name "${{ env.APP_NAME }}" 2>/dev/null || true
            exit 1
          fi
          echo "Binary: $BINARY ($(du -sh "$BINARY" | cut -f1))"
          file "$BINARY"
          ldd "$BINARY" | grep Qt || true

      # ── Stage deployment package ──────────────────────────────────────────
      # The IFW installer needs all runtime files in place before CPack runs.
      - name: Stage package contents
        working-directory: fincept-qt
        run: |
          set -euo pipefail
          BUILD_DIR="build"
          STAGE_DIR="${BUILD_DIR}/stage"
          mkdir -p "${STAGE_DIR}"

          # Binary
          cp "${BUILD_DIR}/${{ env.APP_NAME }}" "${STAGE_DIR}/"
          chmod +x "${STAGE_DIR}/${{ env.APP_NAME }}"

          # Resources and Python analytics scripts
          cp -r resources "${STAGE_DIR}/resources" 2>/dev/null || true
          cp -r scripts   "${STAGE_DIR}/scripts"   2>/dev/null || true

          # Qt platform / xcb plugins — needed at runtime even if not via linuxdeployqt
          QT6_LIBS_DIR=$(qmake6 -query QT_INSTALL_LIBS 2>/dev/null || true)
          QT6_PLUGINS_DIR=$(qmake6 -query QT_INSTALL_PLUGINS 2>/dev/null || true)
          if [ -n "${QT6_PLUGINS_DIR}" ]; then
            mkdir -p "${STAGE_DIR}/plugins/platforms"
            cp -r "${QT6_PLUGINS_DIR}/platforms/"*.so "${STAGE_DIR}/plugins/platforms/" 2>/dev/null || true
            mkdir -p "${STAGE_DIR}/plugins/sqldrivers"
            cp -r "${QT6_PLUGINS_DIR}/sqldrivers/libqsqlite.so" "${STAGE_DIR}/plugins/sqldrivers/" 2>/dev/null || true
            mkdir -p "${STAGE_DIR}/plugins/imageformats"
            cp -r "${QT6_PLUGINS_DIR}/imageformats/"*.so "${STAGE_DIR}/plugins/imageformats/" 2>/dev/null || true
            mkdir -p "${STAGE_DIR}/plugins/xcbglintegrations"
            cp -r "${QT6_PLUGINS_DIR}/xcbglintegrations/"*.so "${STAGE_DIR}/plugins/xcbglintegrations/" 2>/dev/null || true
          fi

          # qt.conf so the binary finds plugins relative to itself
          printf '[Paths]\nPrefix = .\nPlugins = plugins\nLibraries = .\n' > "${STAGE_DIR}/qt.conf"

          echo "=== Staged files: $(find "${STAGE_DIR}" -type f | wc -l) ==="
          du -sh "${STAGE_DIR}"

      # ── Generate installer via CPack IFW ──────────────────────────────────
      - name: Generate Installer (CPack IFW)
        working-directory: fincept-qt/build
        run: |
          set -euo pipefail
          export PATH="${QT_IFW_DIR}/bin:${PATH}"

          if command -v binarycreator &>/dev/null; then
            echo "Running CPack IFW..."
            cpack -G IFW --verbose
            echo "=== Generated IFW installer ==="
            ls -lh ${{ env.APP_NAME }}-*-setup* 2>/dev/null || ls -lh *.run 2>/dev/null || true
          else
            echo "::error::binarycreator not found — ensure QT_IFW_DIR is set correctly"
            exit 1
          fi

      # ── Upload installer artifact ─────────────────────────────────────────
      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: FinceptTerminal-Linux-x64-installer
          path: |
            fincept-qt/build/FinceptTerminal-*-setup*
            fincept-qt/build/FinceptTerminal-*.run
          retention-days: 30

  # ── Release: attach installer to GitHub Release ──────────────────────────
  release:
    needs: build
    runs-on: ubuntu-latest
    name: Attach Linux Installer to Release
    if: "!cancelled() && needs.build.result == 'success' && startsWith(github.ref, 'refs/tags/')"
    permissions:
      contents: write

    steps:
      - name: Download installer artifact
        uses: actions/download-artifact@v4
        with:
          name: FinceptTerminal-Linux-x64-installer
          path: installer

      - name: List installer files
        run: find installer -type f | sort

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: installer/**
          fail_on_unmatched_files: false
