name: Test Setup Scripts

on:
  push:
    paths:
      - 'setup.sh'
      - 'setup.bat'
      - 'fincept-qt/CMakeLists.txt'
  pull_request:
    paths:
      - 'setup.sh'
      - 'setup.bat'
      - 'fincept-qt/CMakeLists.txt'
  workflow_dispatch:

jobs:
  test-setup:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: Linux
            binary: fincept-qt/build/FinceptTerminal

          - os: macos-14
            platform: macOS
            binary: fincept-qt/build/FinceptTerminal

          - os: windows-2022
            platform: Windows
            binary: fincept-qt/build/Release/FinceptTerminal.exe

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Qt6 (Windows/macOS via installer action) ────────────
      - name: Install Qt6 (Windows/macOS)
        if: runner.os != 'Linux'
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.3"
          arch: ${{ runner.os == 'Windows' && 'win64_msvc2022_64' || 'clang_64' }}
          modules: "qtcharts qtwebsockets"
          cache: true

      # ── Linux / macOS — run setup.sh --ci ──────────────────
      - name: Run setup.sh --ci (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          chmod +x setup.sh
          ./setup.sh --ci

      # ── Windows — run setup.bat --ci ───────────────────────
      - name: Run setup.bat --ci (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: setup.bat --ci

      # ── Verify binary exists ────────────────────────────────
      - name: Verify binary
        shell: bash
        run: |
          if [ ! -f "${{ matrix.binary }}" ]; then
            echo "ERROR: Binary not found at ${{ matrix.binary }}"
            ls -la fincept-qt/build/ 2>/dev/null || true
            ls -la fincept-qt/build/Release/ 2>/dev/null || true
            exit 1
          fi
          echo "Binary verified: ${{ matrix.binary }}"
          ls -lh "${{ matrix.binary }}"
