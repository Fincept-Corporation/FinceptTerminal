name: Test Setup Scripts

on:
  workflow_dispatch:

jobs:
  test-setup:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: Linux
            binary: fincept-qt/build/FinceptTerminal

          - os: macos-14
            platform: macOS
            binary: fincept-qt/build/FinceptTerminal

          - os: windows-2022
            platform: Windows
            binary: fincept-qt/build/Release/FinceptTerminal.exe

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Qt6 (Windows/macOS via installer action) ────────────
      - name: Install Qt6 (Windows/macOS)
        if: runner.os != 'Linux'
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.3"
          arch: ${{ runner.os == 'Windows' && 'win64_msvc2022_64' || 'clang_64' }}
          modules: "qtcharts qtwebsockets qtsql"
          cache: true

      # ── Linux — install deps and build directly ─────────────
      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            cmake g++ python3 python3-pip \
            qt6-base-dev libqt6charts6-dev qt6-tools-dev \
            libqt6sql6-sqlite libqt6websockets6-dev \
            libgl1-mesa-dev libglu1-mesa-dev pkg-config
          cd fincept-qt
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel

      # ── macOS — run setup.sh --ci ───────────────────────────
      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: |
          chmod +x setup.sh
          ./setup.sh --ci

      # ── Windows — build using MSVC environment ──────────────
      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cd fincept-qt
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release --parallel

      # ── Verify binary exists ────────────────────────────────
      - name: Verify binary
        shell: bash
        run: |
          if [ ! -f "${{ matrix.binary }}" ]; then
            echo "ERROR: Binary not found at ${{ matrix.binary }}"
            ls -la fincept-qt/build/ 2>/dev/null || true
            ls -la fincept-qt/build/Release/ 2>/dev/null || true
            exit 1
          fi
          echo "Binary verified: ${{ matrix.binary }}"
          ls -lh "${{ matrix.binary }}"
