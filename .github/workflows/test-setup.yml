name: Test Setup Scripts

on:
  push:
    paths:
      - 'setup.sh'
      - 'setup.bat'
      - 'fincept-cpp/CMakeLists.txt'
      - 'fincept-cpp/vcpkg.json'
  pull_request:
    paths:
      - 'setup.sh'
      - 'setup.bat'
      - 'fincept-cpp/CMakeLists.txt'
      - 'fincept-cpp/vcpkg.json'
  workflow_dispatch:

env:
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  test-setup:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: Linux
            binary: fincept-cpp/build/FinceptTerminal

          - os: macos-14
            platform: macOS
            binary: fincept-cpp/build/FinceptTerminal

          - os: windows-2022
            platform: Windows
            binary: fincept-cpp/build/Release/FinceptTerminal.exe

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup vcpkg caching
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      # ── Linux / macOS — run setup.sh --ci ──────────────────
      - name: Run setup.sh --ci (Linux/macOS)
        if: runner.os != 'Windows'
        env:
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg
        run: |
          chmod +x setup.sh
          ./setup.sh --ci

      # ── Windows — run setup.bat --ci ───────────────────────
      - name: Run setup.bat --ci (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        env:
          VCPKG_ROOT: ${{ github.workspace }}\vcpkg
        run: setup.bat --ci

      # ── Verify binary exists ────────────────────────────────
      - name: Verify binary
        shell: bash
        run: |
          if [ ! -f "${{ matrix.binary }}" ]; then
            echo "ERROR: Binary not found at ${{ matrix.binary }}"
            ls -la fincept-cpp/build/ 2>/dev/null || true
            ls -la fincept-cpp/build/Release/ 2>/dev/null || true
            exit 1
          fi
          echo "Binary verified: ${{ matrix.binary }}"
          ls -lh "${{ matrix.binary }}"
