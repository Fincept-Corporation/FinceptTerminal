name: Build macOS Installer (Apple Silicon)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  BUILD_TYPE: Release
  QT_VERSION: "6.8.3"
  QT_MODULES: "qtcharts qtwebsockets qtmultimedia"
  QT_IFW_VERSION: "4.7"
  QT_IFW_TOOL: "tools_ifw"
  APP_NAME: FinceptTerminal
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: macOS arm64 Installer
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-tags: true

      # ── ccache ────────────────────────────────────────────────────────────
      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: macos-arm64-installer-${{ env.QT_VERSION }}
          max-size: 500M

      # ── Install build tools ───────────────────────────────────────────────
      - name: Install build tools
        run: brew install ninja cmake || brew upgrade ninja cmake || true

      # ── Install Qt 6.8.3 (official installer, includes private headers) ──
      - name: Install Qt ${{ env.QT_VERSION }}
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          arch: clang_64
          modules: ${{ env.QT_MODULES }}
          cache: true
          cache-key-prefix: qt-macos-arm64-installer

      # ── Ensure Python 3.12 is installed (for embedding) ──────────────────
      - name: Install Python 3.12
        run: |
          brew install python@3.12 || brew upgrade python@3.12 || true
          python3.12 --version

      # ── Install Qt Installer Framework ────────────────────────────────────
      # Uses --break-system-packages because macOS Sequoia (PEP 668) blocks
      # system-wide pip installs without it.
      - name: Install Qt Installer Framework
        run: |
          pip3 install --break-system-packages aqtinstall
          aqt install-tool mac desktop ${{ env.QT_IFW_TOOL }} \
            --outputdir "${{ runner.temp }}/qtifw"
          IFW_DIR="${{ runner.temp }}/qtifw/Tools/QtInstallerFramework/${{ env.QT_IFW_VERSION }}"
          echo "QT_IFW_DIR=${IFW_DIR}" >> "$GITHUB_ENV"
          echo "PATH=${IFW_DIR}/bin:${PATH}" >> "$GITHUB_ENV"
          echo "QtIFW installed:"
          ls "${IFW_DIR}/bin/" || true

      # ── Generate macOS .icns icon from .ico ────────────────────────────────
      # CMake expects resources/fincept.icns for MACOSX_BUNDLE_ICON_FILE.
      # The repo only has fincept.ico (Windows). Convert using sips + iconutil.
      - name: Generate .icns icon
        working-directory: fincept-qt
        run: |
          ICO="resources/fincept.ico"
          ICNS="resources/fincept.icns"
          if [ -f "${ICNS}" ]; then
            echo ".icns already exists — skipping generation"
          elif [ -f "${ICO}" ]; then
            ICONSET="$(mktemp -d)/fincept.iconset"
            mkdir -p "${ICONSET}"
            # Extract the largest image from the .ico and resize to all required sizes
            sips -s format png "${ICO}" --out "${ICONSET}/icon_512x512.png" --resampleHeightWidth 512 512 2>/dev/null
            for size in 16 32 64 128 256; do
              sips -z ${size} ${size} "${ICONSET}/icon_512x512.png" --out "${ICONSET}/icon_${size}x${size}.png" 2>/dev/null
            done
            # Retina variants (@2x)
            cp "${ICONSET}/icon_512x512.png" "${ICONSET}/icon_256x256@2x.png"
            sips -z 1024 1024 "${ICONSET}/icon_512x512.png" --out "${ICONSET}/icon_512x512@2x.png" 2>/dev/null
            sips -z 64 64 "${ICONSET}/icon_512x512.png" --out "${ICONSET}/icon_32x32@2x.png" 2>/dev/null
            sips -z 32 32 "${ICONSET}/icon_512x512.png" --out "${ICONSET}/icon_16x16@2x.png" 2>/dev/null
            sips -z 256 256 "${ICONSET}/icon_512x512.png" --out "${ICONSET}/icon_128x128@2x.png" 2>/dev/null
            iconutil -c icns -o "${ICNS}" "${ICONSET}"
            echo "Generated ${ICNS} ($(du -sh "${ICNS}" | cut -f1))"
          else
            echo "WARNING: No source icon found — app will have generic icon"
          fi

      # ── Configure CMake ───────────────────────────────────────────────────
      - name: Configure CMake
        working-directory: fincept-qt
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_PREFIX_PATH="${QT_ROOT_DIR}" \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DFINCEPT_BUILD_INSTALLER=ON \
            -DDEPLOY_QT=ON

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build
        working-directory: fincept-qt
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel $(sysctl -n hw.logicalcpu)

      # ── Verify binary ─────────────────────────────────────────────────────
      - name: Verify binary
        working-directory: fincept-qt
        run: |
          if [ -f "build/${{ env.APP_NAME }}" ]; then
            BINARY="build/${{ env.APP_NAME }}"
          elif [ -f "build/${{ env.APP_NAME }}.app/Contents/MacOS/${{ env.APP_NAME }}" ]; then
            BINARY="build/${{ env.APP_NAME }}.app/Contents/MacOS/${{ env.APP_NAME }}"
          else
            echo "ERROR: binary not found"
            find build -maxdepth 3 -name "${{ env.APP_NAME }}*" || true
            exit 1
          fi
          echo "Binary: $BINARY ($(du -sh "$BINARY" | cut -f1))"
          file "$BINARY"
          lipo -info "$BINARY"

      # ── Package .app bundle (macdeployqt + Python + resources) ────────────
      - name: Package .app bundle
        working-directory: fincept-qt
        run: |
          set -euo pipefail
          MACDEPLOYQT="${QT_ROOT_DIR}/bin/macdeployqt"
          BUILD_DIR="build"
          DIST_DIR="dist"
          mkdir -p "${DIST_DIR}"

          # Locate or create .app bundle
          if [ -d "${BUILD_DIR}/${{ env.APP_NAME }}.app" ]; then
            APP_BUNDLE="${BUILD_DIR}/${{ env.APP_NAME }}.app"
          else
            APP_BUNDLE="${BUILD_DIR}/${{ env.APP_NAME }}.app"
            mkdir -p "${APP_BUNDLE}/Contents/MacOS"
            cp "${BUILD_DIR}/${{ env.APP_NAME }}" "${APP_BUNDLE}/Contents/MacOS/${{ env.APP_NAME }}"
            chmod +x "${APP_BUNDLE}/Contents/MacOS/${{ env.APP_NAME }}"
            cat > "${APP_BUNDLE}/Contents/Info.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>CFBundleExecutable</key><string>FinceptTerminal</string>
            <key>CFBundleIdentifier</key><string>in.fincept.terminal</string>
            <key>CFBundleName</key><string>FinceptTerminal</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleShortVersionString</key><string>4.0.0</string>
            <key>NSHighResolutionCapable</key><true/>
          </dict></plist>
          PLIST
          fi

          # NOTE: macdeployqt is NOT run here — it already ran as a CMake POST_BUILD
          # command (DEPLOY_QT=ON). Running it twice causes rpath conflicts and
          # duplicate "ERROR: no file at ..." noise. SQL plugin cleanup is also
          # handled by the POST_BUILD step in CMakeLists.txt.

          # Embed Python 3.12 framework.
          # On macOS CI runners, Python.framework may live in several locations:
          #   1. /Library/Frameworks/Python.framework  (system / python.org installer)
          #   2. $(brew --prefix python@3.12)/Frameworks/Python.framework  (Homebrew)
          # The GitHub Actions runner typically has the system framework at /Library/Frameworks.
          PY_FRAMEWORK=""
          for candidate in \
            "/Library/Frameworks/Python.framework" \
            "$(brew --prefix python@3.12 2>/dev/null)/Frameworks/Python.framework" \
            "$(brew --prefix python3 2>/dev/null)/Frameworks/Python.framework"; do
            if [ -d "${candidate}/Versions" ]; then
              PY_FRAMEWORK="${candidate}"
              break
            fi
          done

          BUNDLE_FRAMEWORKS="${APP_BUNDLE}/Contents/Frameworks"
          mkdir -p "${BUNDLE_FRAMEWORKS}"
          if [ -n "${PY_FRAMEWORK}" ]; then
            echo "Embedding Python.framework from: ${PY_FRAMEWORK}"
            cp -R "${PY_FRAMEWORK}" "${BUNDLE_FRAMEWORKS}/"
            PY_VER="$(python3 -c 'import sys; print(f"{sys.version_info.major}.{sys.version_info.minor}")')"
            ln -sf "../Frameworks/Python.framework/Versions/${PY_VER}/bin/python${PY_VER}" \
                   "${APP_BUNDLE}/Contents/MacOS/python3" 2>/dev/null || true
            echo "Python ${PY_VER} embedded successfully"
          else
            echo "WARNING: Python.framework not found — PythonRunner will require system Python"
          fi

          # Copy resources and Python analytics scripts
          cp -r resources "${APP_BUNDLE}/Contents/Resources/" 2>/dev/null || true
          cp -r scripts   "${APP_BUNDLE}/Contents/Resources/scripts" 2>/dev/null || true

          # Stage to dist/ for CPack / DMG packaging
          cp -r "${APP_BUNDLE}" "${DIST_DIR}/"

          # Diagnostics
          echo "=== Bundle size ===" && du -sh "${DIST_DIR}/${{ env.APP_NAME }}.app"
          echo "=== Qt frameworks ===" && ls "${DIST_DIR}/${{ env.APP_NAME }}.app/Contents/Frameworks/" | grep -i qt || true
          echo "=== SQL plugins (should have no odbc/psql/mimer) ===" \
            && ls "${DIST_DIR}/${{ env.APP_NAME }}.app/Contents/PlugIns/sqldrivers/" 2>/dev/null || true

      # ── Generate installer via CPack IFW ──────────────────────────────────
      # Falls back to DMG if binarycreator is unavailable.
      - name: Generate Installer
        working-directory: fincept-qt/build
        run: |
          set -euo pipefail
          export PATH="${QT_IFW_DIR}/bin:${PATH}"

          if command -v binarycreator &>/dev/null; then
            echo "Running CPack IFW..."
            cpack -G IFW --verbose
            echo "=== Generated IFW installer ==="
            ls -lh ${{ env.APP_NAME }}-*-setup* 2>/dev/null || ls -lh *.app *.dmg 2>/dev/null || true
          else
            echo "::warning::binarycreator not found — falling back to DMG via hdiutil"
            STAGING="$(mktemp -d)/dmg_staging"
            mkdir -p "${STAGING}"
            cp -r "../dist/${{ env.APP_NAME }}.app" "${STAGING}/"
            hdiutil create \
              -volname "${{ env.APP_NAME }}" \
              -srcfolder "${STAGING}" \
              -ov -format UDZO \
              "${{ env.APP_NAME }}-macOS-arm64.dmg"
            echo "=== Generated DMG ==="
            ls -lh ${{ env.APP_NAME }}-*.dmg
          fi

      # ── Upload installer artifact ─────────────────────────────────────────
      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: FinceptTerminal-macOS-arm64-installer
          path: |
            fincept-qt/build/FinceptTerminal-*-setup*
            fincept-qt/build/FinceptTerminal-*.dmg
          retention-days: 30

  # ── Release: attach installer to GitHub Release ──────────────────────────
  release:
    needs: build
    runs-on: ubuntu-latest
    name: Attach macOS Installer to Release
    if: "!cancelled() && needs.build.result == 'success' && startsWith(github.ref, 'refs/tags/')"
    permissions:
      contents: write

    steps:
      - name: Download installer artifact
        uses: actions/download-artifact@v4
        with:
          name: FinceptTerminal-macOS-arm64-installer
          path: installer

      - name: List installer files
        run: find installer -type f | sort

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: installer/**
          fail_on_unmatched_files: false
