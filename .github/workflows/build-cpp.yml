name: Build Qt Terminal — All Platforms

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  BUILD_TYPE: Release
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # ---- Windows x64 ----
          - os: windows-2022
            arch: x64
            platform: Windows
            artifact: FinceptTerminal-Windows-x64
            exe: FinceptTerminal.exe
            qt_arch: win64_msvc2022_64
            qt_version: "6.8.3"
            cmake_extra: ""

          # ---- Windows ARM64 (cross-compile from x64) ----
          - os: windows-2022
            arch: arm64
            platform: Windows
            artifact: FinceptTerminal-Windows-arm64
            exe: FinceptTerminal.exe
            qt_arch: win64_msvc2022_arm64
            qt_version: "6.8.3"
            cmake_extra: "-A ARM64"

          # ---- Linux x64 ----
          - os: ubuntu-22.04
            arch: x64
            platform: Linux
            artifact: FinceptTerminal-Linux-x64
            exe: FinceptTerminal
            qt_arch: ""
            qt_version: ""
            cmake_extra: ""

          # ---- macOS ARM64 (Apple Silicon) ----
          - os: macos-14
            arch: arm64
            platform: macOS
            artifact: FinceptTerminal-macOS-arm64
            exe: FinceptTerminal
            qt_arch: clang_64
            qt_version: "6.8.3"
            cmake_extra: "-DCMAKE_OSX_ARCHITECTURES=arm64"

          # ---- macOS x64 (Intel) ----
          - os: macos-15-intel
            arch: x64
            platform: macOS
            artifact: FinceptTerminal-macOS-x64
            exe: FinceptTerminal
            qt_arch: clang_64
            qt_version: "6.8.3"
            cmake_extra: "-DCMAKE_OSX_ARCHITECTURES=x86_64"

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.platform }} ${{ matrix.arch }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Debug — environment info
        shell: bash
        run: |
          echo "::group::Environment"
          echo "OS: ${{ matrix.os }}"
          echo "Platform: ${{ matrix.platform }}"
          echo "Arch: ${{ matrix.arch }}"
          echo "Workspace: ${{ github.workspace }}"
          cmake --version || echo "CMake not found"
          echo "::endgroup::"

      # ---- System dependencies (Linux) ----
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake g++ python3 python3-pip \
            qt6-base-dev qt6-charts-dev qt6-tools-dev \
            libqt6sql6-sqlite libqt6websockets6-dev \
            libgl1-mesa-dev libglu1-mesa-dev \
            pkg-config

      # ---- Qt6 (Windows + macOS via installer action) ----
      - name: Install Qt6 (Windows/macOS)
        if: runner.os != 'Linux'
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ matrix.qt_version }}
          arch: ${{ matrix.qt_arch }}
          modules: "qtcharts qtwebsockets qtsql"
          cache: true

      # ---- Configure ----
      - name: Configure CMake
        shell: bash
        working-directory: fincept-qt
        run: |
          echo "::group::CMake Configure"

          CMAKE_ARGS="-B build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}"

          # On Linux Qt6 is found automatically via system install
          # On Windows/macOS CMAKE_PREFIX_PATH is set by install-qt-action
          CMAKE_ARGS="$CMAKE_ARGS ${{ matrix.cmake_extra }}"

          echo "Running: cmake $CMAKE_ARGS"
          cmake $CMAKE_ARGS
          echo "::endgroup::"

          if [ ! -f build/CMakeCache.txt ]; then
            echo "::error::CMake configure failed — CMakeCache.txt not found"
            exit 1
          fi
          echo "CMake configure succeeded"

      # ---- Build ----
      - name: Build
        shell: bash
        working-directory: fincept-qt
        run: |
          echo "::group::CMake Build"
          cmake --build build --config ${{ env.BUILD_TYPE }} --parallel
          echo "::endgroup::"

      # ---- Verify build output ----
      - name: Verify build output
        shell: bash
        working-directory: fincept-qt
        run: |
          if [ "${{ runner.os }}" == "Windows" ]; then
            BINARY="build/Release/${{ matrix.exe }}"
          else
            BINARY="build/${{ matrix.exe }}"
          fi
          if [ ! -f "$BINARY" ]; then
            echo "::error::Build output not found at $BINARY"
            ls -la build/ 2>/dev/null || true
            ls -la build/Release/ 2>/dev/null || true
            exit 1
          fi
          echo "Build output verified: $BINARY"
          ls -lh "$BINARY"

      # ---- Collect artifacts (Windows) ----
      - name: Collect artifacts (Windows)
        if: runner.os == 'Windows'
        shell: bash
        working-directory: fincept-qt
        run: |
          mkdir -p dist
          # Copy entire Release dir (windeployqt runs POST_BUILD and copies Qt DLLs there)
          cp -r build/Release/. dist/
          cp -r resources dist/resources 2>/dev/null || true
          cp -r scripts dist/scripts 2>/dev/null || true
          echo "Bundled $(find dist/scripts -name '*.py' 2>/dev/null | wc -l) Python scripts"
          echo "=== Collected artifacts ==="
          ls -lh dist/

      # ---- Collect artifacts (Linux/macOS) ----
      - name: Collect artifacts (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        working-directory: fincept-qt
        run: |
          mkdir -p dist
          cp build/${{ matrix.exe }} dist/
          chmod +x dist/${{ matrix.exe }}
          cp -r resources dist/resources 2>/dev/null || true
          cp -r scripts dist/scripts 2>/dev/null || true
          echo "Bundled $(find dist/scripts -name '*.py' 2>/dev/null | wc -l) Python scripts"
          echo "=== Collected artifacts ==="
          ls -lh dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: fincept-qt/dist/
          retention-days: 30

  # ---- macOS Universal Binary ----
  macos-universal:
    needs: build
    runs-on: macos-14
    name: macOS Universal
    if: |
      !cancelled() &&
      needs.build.result == 'success'

    steps:
      - name: Download macOS arm64
        uses: actions/download-artifact@v4
        with:
          name: FinceptTerminal-macOS-arm64
          path: arm64

      - name: Download macOS x64
        uses: actions/download-artifact@v4
        with:
          name: FinceptTerminal-macOS-x64
          path: x64

      - name: Verify downloads
        run: |
          echo "=== arm64 ==="
          ls -lh arm64/
          file arm64/FinceptTerminal || { echo "::error::arm64 binary missing"; exit 1; }
          echo "=== x64 ==="
          ls -lh x64/
          file x64/FinceptTerminal || { echo "::error::x64 binary missing"; exit 1; }

      - name: Create Universal Binary
        run: |
          mkdir -p dist
          lipo -create arm64/FinceptTerminal x64/FinceptTerminal -output dist/FinceptTerminal
          chmod +x dist/FinceptTerminal
          cp -r arm64/resources dist/resources 2>/dev/null || true
          cp -r arm64/scripts dist/scripts 2>/dev/null || true
          echo "=== Universal Binary ==="
          file dist/FinceptTerminal
          ls -lh dist/FinceptTerminal

      - name: Upload Universal artifact
        uses: actions/upload-artifact@v4
        with:
          name: FinceptTerminal-macOS-universal
          path: dist/
          retention-days: 30

  # ---- Release ----
  release:
    needs: [build, macos-universal]
    runs-on: ubuntu-latest
    if: |
      !cancelled() &&
      needs.build.result == 'success'
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Debug — list artifacts
        run: |
          echo "=== Downloaded artifacts ==="
          find artifacts -type f | sort
          echo "=== Disk usage ==="
          du -sh artifacts/*/

      - name: Package releases
        shell: bash
        run: |
          cd artifacts
          for dir in */; do
            name="${dir%/}"
            cd "$name"
            if [[ "$name" == *"Windows"* ]]; then
              zip -r "../../${name}.zip" .
              echo "Packaged: ${name}.zip"
            else
              tar -czf "../../${name}.tar.gz" .
              echo "Packaged: ${name}.tar.gz"
            fi
            cd ..
          done
          cd ..
          echo "=== Release packages ==="
          ls -lh FinceptTerminal-*.{zip,tar.gz} 2>/dev/null || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ github.ref_type == 'tag' && github.ref_name || format('build-{0}', github.run_number) }}"
          name: "${{ github.ref_type == 'tag' && format('Fincept Terminal {0}', github.ref_name) || format('Fincept Terminal Build {0}', github.run_number) }}"
          make_latest: "${{ github.ref_type == 'tag' }}"
          body: |
            Automated build from commit ${{ github.sha }}

            ## Downloads

            ### Windows
            - `FinceptTerminal-Windows-x64.zip` — Windows x86_64
            - `FinceptTerminal-Windows-arm64.zip` — Windows ARM64

            ### Linux
            - `FinceptTerminal-Linux-x64.tar.gz` — Linux x86_64

            ### macOS
            - `FinceptTerminal-macOS-arm64.tar.gz` — macOS Apple Silicon (M1/M2/M3/M4)
            - `FinceptTerminal-macOS-x64.tar.gz` — macOS Intel
            - `FinceptTerminal-macOS-universal.tar.gz` — macOS Universal (both architectures)
          files: |
            FinceptTerminal-Windows-x64.zip
            FinceptTerminal-Windows-arm64.zip
            FinceptTerminal-Linux-x64.tar.gz
            FinceptTerminal-macOS-arm64.tar.gz
            FinceptTerminal-macOS-x64.tar.gz
            FinceptTerminal-macOS-universal.tar.gz
          fail_on_unmatched_files: false
          draft: false
          prerelease: "${{ github.ref_type != 'tag' }}"
