name: Build Qt Terminal - All Platforms

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  BUILD_TYPE: Release
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # ---- Windows x64 ----
          - os: windows-2022
            arch: x64
            platform: Windows
            artifact: FinceptTerminal-Windows-x64
            exe: FinceptTerminal.exe
            qt_arch: win64_msvc2022_64
            qt_version: "6.8.3"
            cmake_extra: ""

          # ---- Windows ARM64 ----
          - os: windows-2022
            arch: arm64
            platform: Windows
            artifact: FinceptTerminal-Windows-arm64
            exe: FinceptTerminal.exe
            qt_arch: win64_msvc2022_arm64
            qt_version: "6.8.3"
            cmake_extra: "-A ARM64"

          # ---- Linux x64 ----
          - os: ubuntu-22.04
            arch: x64
            platform: Linux
            artifact: FinceptTerminal-Linux-x64
            exe: FinceptTerminal
            qt_arch: ""
            qt_version: ""
            cmake_extra: ""

          # ---- macOS ARM64 (Apple Silicon) ----
          - os: macos-14
            arch: arm64
            platform: macOS
            artifact: FinceptTerminal-macOS-arm64
            exe: FinceptTerminal
            qt_arch: clang_64
            qt_version: "6.8.3"
            cmake_extra: "-DCMAKE_OSX_ARCHITECTURES=arm64"

          # ---- macOS x64 (Intel) ----
          - os: macos-15-intel
            arch: x64
            platform: macOS
            artifact: FinceptTerminal-macOS-x64
            exe: FinceptTerminal
            qt_arch: clang_64
            qt_version: "6.8.3"
            cmake_extra: "-DCMAKE_OSX_ARCHITECTURES=x86_64"

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.platform }} ${{ matrix.arch }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Environment info
        shell: bash
        run: |
          echo "OS: ${{ matrix.os }}"
          echo "Platform: ${{ matrix.platform }}"
          echo "Arch: ${{ matrix.arch }}"
          cmake --version || echo "CMake not found"

      # ---- System dependencies (Linux) ----
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake g++ python3 python3-pip \
            qt6-base-dev qt6-charts-dev qt6-tools-dev \
            libqt6sql6-sqlite libqt6websockets6-dev \
            libgl1-mesa-dev libglu1-mesa-dev \
            pkg-config

      # ---- Qt6 (Windows + macOS) ----
      - name: Install Qt6 (Windows/macOS)
        if: runner.os != 'Linux'
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ matrix.qt_version }}
          arch: ${{ matrix.qt_arch }}
          modules: "qtcharts qtwebsockets qtsql"
          cache: true

      # ---- Configure ----
      - name: Configure CMake
        shell: bash
        working-directory: fincept-qt
        run: |
          CMAKE_ARGS="-B build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} ${{ matrix.cmake_extra }}"
          echo "Running: cmake $CMAKE_ARGS"
          cmake $CMAKE_ARGS
          if [ ! -f build/CMakeCache.txt ]; then
            echo "::error::CMake configure failed"
            exit 1
          fi

      # ---- Build ----
      - name: Build
        shell: bash
        working-directory: fincept-qt
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

      # ---- Verify ----
      - name: Verify build output
        shell: bash
        working-directory: fincept-qt
        run: |
          if [ "${{ runner.os }}" == "Windows" ]; then
            BINARY="build/Release/${{ matrix.exe }}"
          else
            BINARY="build/${{ matrix.exe }}"
          fi
          if [ ! -f "$BINARY" ]; then
            echo "::error::Binary not found at $BINARY"
            exit 1
          fi
          echo "Binary verified: $BINARY"
          ls -lh "$BINARY"

      # ---- Collect artifacts (Windows) ----
      - name: Collect artifacts (Windows)
        if: runner.os == 'Windows'
        shell: bash
        working-directory: fincept-qt
        run: |
          mkdir -p dist
          cp -r build/Release/. dist/
          cp -r resources dist/resources 2>/dev/null || true
          cp -r scripts dist/scripts 2>/dev/null || true

      # ---- Collect artifacts (Linux/macOS) ----
      - name: Collect artifacts (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        working-directory: fincept-qt
        run: |
          mkdir -p dist
          cp build/${{ matrix.exe }} dist/
          chmod +x dist/${{ matrix.exe }}
          cp -r resources dist/resources 2>/dev/null || true
          cp -r scripts dist/scripts 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: fincept-qt/dist/
          retention-days: 30

  # ---- macOS Universal Binary ----
  macos-universal:
    needs: build
    runs-on: macos-14
    name: macOS Universal
    if: "!cancelled() && needs.build.result == 'success'"

    steps:
      - name: Download macOS arm64
        uses: actions/download-artifact@v4
        with:
          name: FinceptTerminal-macOS-arm64
          path: arm64

      - name: Download macOS x64
        uses: actions/download-artifact@v4
        with:
          name: FinceptTerminal-macOS-x64
          path: x64

      - name: Create Universal Binary
        run: |
          mkdir -p dist
          lipo -create arm64/FinceptTerminal x64/FinceptTerminal -output dist/FinceptTerminal
          chmod +x dist/FinceptTerminal
          cp -r arm64/resources dist/resources 2>/dev/null || true
          cp -r arm64/scripts dist/scripts 2>/dev/null || true
          file dist/FinceptTerminal
          ls -lh dist/FinceptTerminal

      - name: Upload Universal artifact
        uses: actions/upload-artifact@v4
        with:
          name: FinceptTerminal-macOS-universal
          path: dist/
          retention-days: 30

  # ---- Release ----
  release:
    needs: [build, macos-universal]
    runs-on: ubuntu-latest
    if: "!cancelled() && needs.build.result == 'success'"
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package releases
        shell: bash
        run: |
          cd artifacts
          for dir in */; do
            name="${dir%/}"
            cd "$name"
            if [[ "$name" == *"Windows"* ]]; then
              zip -r "../../${name}.zip" .
            else
              tar -czf "../../${name}.tar.gz" .
            fi
            cd ..
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Fincept Terminal ${{ github.ref_name }}
          make_latest: true
          body: |
            Fincept Terminal ${{ github.ref_name }}

            ## Downloads

            ### Windows
            - `FinceptTerminal-Windows-x64.zip` - Windows x86_64
            - `FinceptTerminal-Windows-arm64.zip` - Windows ARM64

            ### Linux
            - `FinceptTerminal-Linux-x64.tar.gz` - Linux x86_64

            ### macOS
            - `FinceptTerminal-macOS-arm64.tar.gz` - macOS Apple Silicon (M1/M2/M3/M4)
            - `FinceptTerminal-macOS-x64.tar.gz` - macOS Intel
            - `FinceptTerminal-macOS-universal.tar.gz` - macOS Universal
          files: |
            FinceptTerminal-Windows-x64.zip
            FinceptTerminal-Windows-arm64.zip
            FinceptTerminal-Linux-x64.tar.gz
            FinceptTerminal-macOS-arm64.tar.gz
            FinceptTerminal-macOS-x64.tar.gz
            FinceptTerminal-macOS-universal.tar.gz
          fail_on_unmatched_files: false
          draft: false
          prerelease: false
