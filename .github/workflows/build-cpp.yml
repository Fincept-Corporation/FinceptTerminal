name: Build C++ Terminal — All Platforms

on:
  workflow_dispatch:

env:
  BUILD_TYPE: Release
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # ---- Windows x64 ----
          - os: windows-2022
            triplet: x64-windows
            host_triplet: x64-windows
            arch: x64
            platform: Windows
            artifact: FinceptTerminal-Windows-x64
            exe: FinceptTerminal.exe
            cmake_extra: ""

          # ---- Windows ARM64 (cross-compile from x64) ----
          - os: windows-2022
            triplet: arm64-windows
            host_triplet: x64-windows
            arch: arm64
            platform: Windows
            artifact: FinceptTerminal-Windows-arm64
            exe: FinceptTerminal.exe
            cmake_extra: "-A ARM64"

          # ---- Linux x64 ----
          - os: ubuntu-22.04
            triplet: x64-linux
            host_triplet: x64-linux
            arch: x64
            platform: Linux
            artifact: FinceptTerminal-Linux-x64
            exe: FinceptTerminal
            cmake_extra: ""

          # ---- macOS ARM64 (Apple Silicon) ----
          - os: macos-14
            triplet: arm64-osx
            host_triplet: arm64-osx
            arch: arm64
            platform: macOS
            artifact: FinceptTerminal-macOS-arm64
            exe: FinceptTerminal
            cmake_extra: "-DCMAKE_OSX_ARCHITECTURES=arm64"

          # ---- macOS x64 (Intel) ----
          - os: macos-15-intel
            triplet: x64-osx
            host_triplet: x64-osx
            arch: x64
            platform: macOS
            artifact: FinceptTerminal-macOS-x64
            exe: FinceptTerminal
            cmake_extra: "-DCMAKE_OSX_ARCHITECTURES=x86_64"

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.platform }} ${{ matrix.arch }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Debug — environment info
        shell: bash
        run: |
          echo "::group::Environment"
          echo "OS: ${{ matrix.os }}"
          echo "Platform: ${{ matrix.platform }}"
          echo "Arch: ${{ matrix.arch }}"
          echo "Triplet: ${{ matrix.triplet }}"
          echo "Host Triplet: ${{ matrix.host_triplet }}"
          echo "Workspace: ${{ github.workspace }}"
          cmake --version || echo "CMake not found"
          echo "::endgroup::"

      - name: Setup vcpkg caching
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      # ---- System dependencies ----
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxinerama-dev libxcursor-dev xorg-dev libglu1-mesa-dev \
            libxrandr-dev libxi-dev libxext-dev libxfixes-dev \
            libwayland-dev libxkbcommon-dev \
            pkg-config autoconf automake libtool \
            python3 python3-pip

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install pkg-config autoconf automake libtool

      # ---- vcpkg ----
      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: '${{ github.workspace }}/vcpkg'
          vcpkgGitCommitId: '23dc124705fcac41cf35c33dd9541f5094a9c19f'

      # ---- Configure ----
      - name: Configure CMake
        shell: bash
        working-directory: fincept-cpp
        run: |
          # Normalize workspace path for cross-platform compatibility
          WORKSPACE_DIR="${{ github.workspace }}"
          WORKSPACE_DIR="${WORKSPACE_DIR//\\//}"

          echo "::group::CMake Configure"
          echo "Toolchain: ${WORKSPACE_DIR}/vcpkg/scripts/buildsystems/vcpkg.cmake"
          echo "Triplet: ${{ matrix.triplet }}"
          echo "Host Triplet: ${{ matrix.host_triplet }}"
          echo "Extra args: ${{ matrix.cmake_extra }}"

          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_TOOLCHAIN_FILE="${WORKSPACE_DIR}/vcpkg/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }} \
            -DVCPKG_HOST_TRIPLET=${{ matrix.host_triplet }} \
            ${{ matrix.cmake_extra }}

          echo "::endgroup::"

          # Verify configure succeeded
          if [ ! -f build/CMakeCache.txt ]; then
            echo "::error::CMake configure failed — CMakeCache.txt not found"
            exit 1
          fi
          echo "CMake configure succeeded"

      # ---- Build ----
      - name: Build
        shell: bash
        working-directory: fincept-cpp
        run: |
          echo "::group::CMake Build"
          cmake --build build --config ${{ env.BUILD_TYPE }} --parallel
          echo "::endgroup::"

      # ---- Verify build output exists ----
      - name: Verify build output
        shell: bash
        working-directory: fincept-cpp
        run: |
          if [ "${{ runner.os }}" == "Windows" ]; then
            BINARY="build/Release/${{ matrix.exe }}"
          else
            BINARY="build/${{ matrix.exe }}"
          fi
          if [ ! -f "$BINARY" ]; then
            echo "::error::Build output not found at $BINARY"
            ls -la build/ 2>/dev/null || true
            ls -la build/Release/ 2>/dev/null || true
            exit 1
          fi
          echo "Build output verified: $BINARY"
          ls -lh "$BINARY"

      # ---- Collect artifacts ----
      - name: Collect artifacts (Windows)
        if: runner.os == 'Windows'
        shell: bash
        working-directory: fincept-cpp
        run: |
          mkdir -p dist
          cp build/Release/${{ matrix.exe }} dist/
          cp build/Release/*.dll dist/ 2>/dev/null || true
          cp -r fonts dist/fonts 2>/dev/null || true
          cp -r resources dist/resources 2>/dev/null || true
          cp -r scripts dist/scripts 2>/dev/null || true
          echo "Bundled $(find dist/scripts -name '*.py' 2>/dev/null | wc -l) Python scripts"
          echo "=== Collected artifacts ==="
          ls -lh dist/

      - name: Collect artifacts (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        working-directory: fincept-cpp
        run: |
          mkdir -p dist
          cp build/${{ matrix.exe }} dist/
          chmod +x dist/${{ matrix.exe }}
          cp -r fonts dist/fonts 2>/dev/null || true
          cp -r resources dist/resources 2>/dev/null || true
          cp -r scripts dist/scripts 2>/dev/null || true
          echo "Bundled $(find dist/scripts -name '*.py' 2>/dev/null | wc -l) Python scripts"
          echo "=== Collected artifacts ==="
          ls -lh dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: fincept-cpp/dist/
          retention-days: 30

  # ---- macOS Universal Binary ----
  macos-universal:
    needs: build
    runs-on: macos-14
    name: macOS Universal
    # Only run if both macOS builds succeeded
    if: |
      !cancelled() &&
      needs.build.result == 'success'

    steps:
      - name: Download macOS arm64
        uses: actions/download-artifact@v4
        with:
          name: FinceptTerminal-macOS-arm64
          path: arm64

      - name: Download macOS x64
        uses: actions/download-artifact@v4
        with:
          name: FinceptTerminal-macOS-x64
          path: x64

      - name: Verify downloads
        run: |
          echo "=== arm64 ==="
          ls -lh arm64/
          file arm64/FinceptTerminal || { echo "::error::arm64 binary missing"; exit 1; }
          echo "=== x64 ==="
          ls -lh x64/
          file x64/FinceptTerminal || { echo "::error::x64 binary missing"; exit 1; }

      - name: Create Universal Binary
        run: |
          mkdir -p dist
          lipo -create arm64/FinceptTerminal x64/FinceptTerminal -output dist/FinceptTerminal
          chmod +x dist/FinceptTerminal
          cp -r arm64/fonts dist/fonts 2>/dev/null || true
          cp -r arm64/resources dist/resources 2>/dev/null || true
          cp -r arm64/scripts dist/scripts 2>/dev/null || true
          echo "=== Universal Binary ==="
          file dist/FinceptTerminal
          ls -lh dist/FinceptTerminal

      - name: Upload Universal artifact
        uses: actions/upload-artifact@v4
        with:
          name: FinceptTerminal-macOS-universal
          path: dist/
          retention-days: 30

  # ---- Release ----
  release:
    needs: [build, macos-universal]
    runs-on: ubuntu-latest
    if: |
      !cancelled() &&
      needs.build.result == 'success'
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Debug — list artifacts
        run: |
          echo "=== Downloaded artifacts ==="
          find artifacts -type f | sort
          echo "=== Disk usage ==="
          du -sh artifacts/*/

      - name: Package releases
        shell: bash
        run: |
          cd artifacts
          for dir in */; do
            name="${dir%/}"
            cd "$name"
            if [[ "$name" == *"Windows"* ]]; then
              zip -r "../../${name}.zip" .
              echo "Packaged: ${name}.zip"
            else
              tar -czf "../../${name}.tar.gz" .
              echo "Packaged: ${name}.tar.gz"
            fi
            cd ..
          done
          cd ..
          echo "=== Release packages ==="
          ls -lh FinceptTerminal-*.{zip,tar.gz} 2>/dev/null || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: cpp-v${{ github.run_number }}
          name: "Fincept Terminal C++ Build #${{ github.run_number }}"
          make_latest: false
          body: |
            Automated C++ build from commit ${{ github.sha }}

            ## Downloads

            ### Windows
            - `FinceptTerminal-Windows-x64.zip` — Windows x86_64
            - `FinceptTerminal-Windows-arm64.zip` — Windows ARM64

            ### Linux
            - `FinceptTerminal-Linux-x64.tar.gz` — Linux x86_64

            ### macOS
            - `FinceptTerminal-macOS-arm64.tar.gz` — macOS Apple Silicon (M1/M2/M3/M4)
            - `FinceptTerminal-macOS-x64.tar.gz` — macOS Intel
            - `FinceptTerminal-macOS-universal.tar.gz` — macOS Universal (both architectures)
          files: |
            FinceptTerminal-Windows-x64.zip
            FinceptTerminal-Windows-arm64.zip
            FinceptTerminal-Linux-x64.tar.gz
            FinceptTerminal-macOS-arm64.tar.gz
            FinceptTerminal-macOS-x64.tar.gz
            FinceptTerminal-macOS-universal.tar.gz
          fail_on_unmatched_files: false
          draft: false
          prerelease: true
