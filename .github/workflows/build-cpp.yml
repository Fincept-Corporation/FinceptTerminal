name: Build Qt Terminal - All Platforms

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  BUILD_TYPE: Release
  QT_VERSION: "6.8.3"
  QT_MODULES: "qtcharts qtwebsockets qtmultimedia"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # ---- Windows x64 ----
          - os: windows-2022
            arch: x64
            platform: Windows
            artifact: FinceptTerminal-Windows-x64
            exe: FinceptTerminal.exe
            qt_arch: win64_msvc2022_64
            cmake_extra: ""

          # ---- Windows ARM64 ----
          - os: windows-2022
            arch: arm64
            platform: Windows
            artifact: FinceptTerminal-Windows-arm64
            exe: FinceptTerminal.exe
            qt_arch: win64_msvc2022_arm64_cross_compiled
            cmake_extra: "-A ARM64"

          # ---- Linux x64 ----
          - os: ubuntu-22.04
            arch: x64
            platform: Linux
            artifact: FinceptTerminal-Linux-x64
            exe: FinceptTerminal
            qt_arch: ""
            cmake_extra: ""

          # ---- macOS ARM64 (Apple Silicon) ----
          - os: macos-15
            arch: arm64
            platform: macOS
            artifact: FinceptTerminal-macOS-arm64
            exe: FinceptTerminal
            qt_arch: clang_64
            cmake_extra: "-DCMAKE_OSX_ARCHITECTURES=arm64"

          # ---- macOS x64 (Intel) ----
          - os: macos-15
            arch: x64
            platform: macOS
            artifact: FinceptTerminal-macOS-x64
            exe: FinceptTerminal
            qt_arch: clang_64
            cmake_extra: "-DCMAKE_OSX_ARCHITECTURES=x86_64"

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.platform }} ${{ matrix.arch }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ---- System dependencies (Linux) ----
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo add-apt-repository universe -y
          sudo apt-get update -qq
          sudo apt-get install -y \
            cmake ninja-build g++ \
            qt6-base-dev qt6-charts-dev qt6-tools-dev qt6-tools-dev-tools \
            libqt6sql6-dev libqt6websockets6-dev \
            qt6-multimedia-dev libqt6multimediawidgets6 \
            libqt6svg6-dev \
            libqt6printsupport6-dev \
            libgl1-mesa-dev libglu1-mesa-dev \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-xinerama0 libxcb-xkb1 libxkbcommon-x11-0 \
            pkg-config zip

      # ---- Qt6 target (Windows/macOS) ----
      - name: Install Qt6
        if: runner.os != 'Linux'
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          arch: ${{ matrix.qt_arch }}
          modules: ${{ env.QT_MODULES }}
          cache: true

      # ---- Qt6 x64 host tools for Windows ARM64 cross-compilation ----
      # moc/uic/rcc must run on the host (x64), not the target (arm64)
      - name: Install Qt6 host tools (Windows ARM64 only)
        if: runner.os == 'Windows' && matrix.arch == 'arm64'
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          arch: win64_msvc2022_64
          modules: ${{ env.QT_MODULES }}
          cache: true
          set-env: false
          dir: "${{ runner.temp }}/qt-host"

      # ---- Configure CMake ----
      - name: Configure CMake (Linux)
        if: runner.os == 'Linux'
        working-directory: fincept-qt
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            ${{ matrix.cmake_extra }}

      - name: Configure CMake (Windows x64 / macOS x64 / macOS arm64)
        if: (runner.os == 'Windows' && matrix.arch == 'x64') || runner.os == 'macOS'
        shell: bash
        working-directory: fincept-qt
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_PREFIX_PATH="${QT_ROOT_DIR}" \
            ${{ matrix.cmake_extra }}

      - name: Configure CMake (Windows ARM64)
        if: runner.os == 'Windows' && matrix.arch == 'arm64'
        shell: bash
        working-directory: fincept-qt
        run: |
          # jurplel/install-qt-action with dir set installs into <dir>/Qt/<version>/<arch>
          HOST_QT="${{ runner.temp }}/qt-host/Qt/${{ env.QT_VERSION }}/msvc2022_64"
          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_PREFIX_PATH="${QT_ROOT_DIR}" \
            -DQT_HOST_PATH="${HOST_QT}" \
            ${{ matrix.cmake_extra }}

      # ---- Build ----
      - name: Build
        shell: bash
        working-directory: fincept-qt
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

      # ---- Verify binary ----
      - name: Verify build output
        shell: bash
        working-directory: fincept-qt
        run: |
          if [ "${{ runner.os }}" == "Windows" ]; then
            BINARY="build/Release/${{ matrix.exe }}"
          else
            BINARY="build/${{ matrix.exe }}"
          fi
          if [ ! -f "$BINARY" ]; then
            echo "::error::Binary not found at $BINARY"
            exit 1
          fi
          echo "Binary verified: $BINARY"
          ls -lh "$BINARY"

      # ---- Package: Windows (windeployqt) ----
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        working-directory: fincept-qt
        run: |
          mkdir -p dist
          cp build/Release/${{ matrix.exe }} dist/
          # windeployqt is always an x64 host tool — find it in the x64 Qt bin dir.
          # For x64 builds QT_ROOT_DIR points to msvc2022_64, so bin/windeployqt.exe works.
          # For ARM64 cross-compiled builds QT_ROOT_DIR points to msvc2022_arm64_cross_compiled;
          # windeployqt.exe lives one level up in msvc2022_64/bin instead.
          WDQT="${QT_ROOT_DIR}/bin/windeployqt.exe"
          if [ ! -f "$WDQT" ]; then
            WDQT="${QT_ROOT_DIR}/../msvc2022_64/bin/windeployqt.exe"
          fi
          if [ -f "$WDQT" ]; then
            "$WDQT" \
              --release \
              --no-translations \
              --no-system-d3d-compiler \
              --no-opengl-sw \
              dist/${{ matrix.exe }}
          else
            echo "::warning::windeployqt not found — Qt DLLs not bundled"
          fi
          cp -r resources dist/resources 2>/dev/null || true
          cp -r scripts dist/scripts 2>/dev/null || true

      # ---- Package: macOS (macdeployqt) ----
      - name: Package (macOS)
        if: runner.os == 'macOS'
        working-directory: fincept-qt
        run: |
          mkdir -p dist
          MACDEPLOYQT="${QT_ROOT_DIR}/bin/macdeployqt"
          APP="build/${{ matrix.exe }}.app"
          if [ -d "$APP" ]; then
            # .app bundle — run macdeployqt to embed Qt frameworks
            "$MACDEPLOYQT" "$APP" 2>/dev/null || true
            cp -r "$APP" dist/
          else
            # Plain binary — create a minimal .app bundle manually then deploy
            BUNDLE="dist/${{ matrix.exe }}.app"
            mkdir -p "$BUNDLE/Contents/MacOS"
            cp "build/${{ matrix.exe }}" "$BUNDLE/Contents/MacOS/${{ matrix.exe }}"
            chmod +x "$BUNDLE/Contents/MacOS/${{ matrix.exe }}"
            cat > "$BUNDLE/Contents/Info.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>CFBundleExecutable</key><string>FinceptTerminal</string>
            <key>CFBundleIdentifier</key><string>in.fincept.terminal</string>
            <key>CFBundleName</key><string>FinceptTerminal</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleShortVersionString</key><string>4.0.0</string>
            <key>NSHighResolutionCapable</key><true/>
          </dict></plist>
          PLIST
            "$MACDEPLOYQT" "$BUNDLE" 2>/dev/null || true
          fi
          cp -r resources dist/resources 2>/dev/null || true
          cp -r scripts dist/scripts 2>/dev/null || true

      # ---- Package: Linux ----
      - name: Package (Linux)
        if: runner.os == 'Linux'
        working-directory: fincept-qt
        run: |
          mkdir -p dist
          cp build/${{ matrix.exe }} dist/
          chmod +x dist/${{ matrix.exe }}
          cp -r resources dist/resources 2>/dev/null || true
          cp -r scripts dist/scripts 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: fincept-qt/dist/
          retention-days: 30

  # ---- macOS Universal Binary ----
  macos-universal:
    needs: build
    runs-on: macos-15
    name: macOS Universal
    if: "!cancelled() && needs.build.result != 'failure'"

    steps:
      - name: Download macOS arm64
        uses: actions/download-artifact@v4
        with:
          name: FinceptTerminal-macOS-arm64
          path: arm64

      - name: Download macOS x64
        uses: actions/download-artifact@v4
        with:
          name: FinceptTerminal-macOS-x64
          path: x64

      - name: Create Universal Binary
        run: |
          mkdir -p dist
          lipo -create arm64/FinceptTerminal x64/FinceptTerminal \
            -output dist/FinceptTerminal
          chmod +x dist/FinceptTerminal
          cp -r arm64/resources dist/resources 2>/dev/null || true
          cp -r arm64/scripts dist/scripts 2>/dev/null || true
          file dist/FinceptTerminal
          ls -lh dist/FinceptTerminal

      - name: Upload Universal artifact
        uses: actions/upload-artifact@v4
        with:
          name: FinceptTerminal-macOS-universal
          path: dist/
          retention-days: 30

  # ---- Release ----
  release:
    needs: [build, macos-universal]
    runs-on: ubuntu-latest
    name: Create Release
    if: "!cancelled() && needs.build.result != 'failure' && startsWith(github.ref, 'refs/tags/')"
    permissions:
      contents: write

    steps:
      - name: Install zip
        run: sudo apt-get install -y zip

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package releases
        shell: bash
        run: |
          cd artifacts
          for dir in */; do
            name="${dir%/}"
            cd "$name"
            if [[ "$name" == *"Windows"* ]]; then
              zip -r "../../${name}.zip" .
            else
              tar -czf "../../${name}.tar.gz" .
            fi
            cd ..
          done
          ls -lh ../

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Fincept Terminal ${{ github.ref_name }}
          make_latest: true
          body: |
            ## Fincept Terminal ${{ github.ref_name }}

            ### Downloads

            **Windows**
            - `FinceptTerminal-Windows-x64.zip` — Windows x64 (MSVC)
            - `FinceptTerminal-Windows-arm64.zip` — Windows ARM64

            **Linux**
            - `FinceptTerminal-Linux-x64.tar.gz` — Linux x64

            **macOS**
            - `FinceptTerminal-macOS-universal.tar.gz` — macOS Universal (ARM64 + Intel)
            - `FinceptTerminal-macOS-arm64.tar.gz` — macOS Apple Silicon
            - `FinceptTerminal-macOS-x64.tar.gz` — macOS Intel
          files: |
            FinceptTerminal-Windows-x64.zip
            FinceptTerminal-Windows-arm64.zip
            FinceptTerminal-Linux-x64.tar.gz
            FinceptTerminal-macOS-arm64.tar.gz
            FinceptTerminal-macOS-x64.tar.gz
            FinceptTerminal-macOS-universal.tar.gz
          fail_on_unmatched_files: false
          draft: false
          prerelease: false
