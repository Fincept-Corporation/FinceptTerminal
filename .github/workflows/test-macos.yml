name: Test macOS Build

on:
  workflow_dispatch:
    inputs:
      arch:
        description: 'Architecture to test'
        required: false
        default: 'arm64'
        type: choice
        options:
          - arm64
          - x64
          - both

env:
  QT_VERSION: "6.8.3"
  QT_MODULES: "qtcharts qtwebsockets qtmultimedia"
  BUILD_TYPE: Release

jobs:
  test-macos:
    runs-on: ${{ (matrix.arch == 'x64') && 'macos-15' || 'macos-15' }}
    strategy:
      fail-fast: false
      matrix:
        arch:
          - ${{ (inputs.arch == 'both' || inputs.arch == 'arm64') && 'arm64' || '' }}
          - ${{ (inputs.arch == 'both' || inputs.arch == 'x64') && 'x64' || '' }}
        exclude:
          - arch: ''

    name: macOS ${{ matrix.arch }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: mac
          target: desktop
          arch: clang_64
          modules: ${{ env.QT_MODULES }}
          cache: true

      - name: Configure CMake
        working-directory: fincept-qt
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_PREFIX_PATH="${QT_ROOT_DIR}" \
            -DCMAKE_OSX_ARCHITECTURES=${{ matrix.arch == 'arm64' && 'arm64' || 'x86_64' }}

      - name: Build
        working-directory: fincept-qt
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel $(sysctl -n hw.logicalcpu)

      - name: Verify binary
        working-directory: fincept-qt
        run: |
          EXE="build/FinceptTerminal"
          if [ ! -f "$EXE" ]; then
            echo "ERROR: binary not found"
            exit 1
          fi
          echo "Binary: $(du -sh $EXE | cut -f1)"
          file "$EXE"
          lipo -info "$EXE" 2>/dev/null || true
